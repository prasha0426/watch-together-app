<!DOCTYPE html>
<html>
<head>
  <title>Watch Together 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    button {
      transition: all 0.2s ease;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body class="bg-[#0F172A] text-white">

<div class="flex flex-col md:flex-row h-screen">

  <!-- 🎬 LEFT: VIDEO SECTION -->
  <div class="md:w-2/3 w-full p-4 flex flex-col">

    <h1 class="text-2xl font-bold text-pink-400 mb-2">
      💖 Watch Together
    </h1>

    <p class="text-sm text-gray-400 mb-2">Connected ❤️</p>

    <video id="video" controls
      class="w-full rounded-2xl shadow-lg border border-gray-700 mb-3">
    </video>

    <input type="file" id="fileInput"
      class="p-2 bg-gray-800 rounded-lg mb-3" />

    <!-- Room Controls -->
    <div class="flex gap-2">
      <input id="roomInput" placeholder="Enter Room ID"
        class="flex-1 p-2 rounded-lg bg-gray-800" />
      <button onclick="joinRoom()"
        class="bg-pink-500 px-4 rounded-lg hover:bg-pink-600">
        Join
      </button>
    </div>

    <p id="syncStatus" class="text-green-400 text-sm mt-2">
      In Sync ✅
    </p>

  </div>

  <!-- 💬 RIGHT: CHAT + PARTNER -->
  <div class="md:w-1/3 w-full bg-[#1E293B] p-4 flex flex-col">

    <!-- Partner Video Placeholder -->
    <div class="mb-4">
      <h2 class="text-pink-400 mb-2">💑 Partner</h2>
      <div class="bg-black h-40 rounded-xl flex items-center justify-center text-gray-400">
        <div class="relative">
  <video id="partnerVideo" autoplay
    class="w-full h-40 bg-black rounded-xl object-cover"></video>

  <video id="myVideo" autoplay muted
    class="w-24 h-24 absolute bottom-2 right-2 rounded-lg border border-white"></video>
</div>

<!-- Controls -->
<div class="flex gap-2 mt-2">
  <button onclick="toggleMic()" class="bg-gray-700 px-2 rounded">🎤</button>
  <button onclick="toggleCamera()" class="bg-gray-700 px-2 rounded">📷</button>
</div>
      </div>
    </div>

    <!-- Chat Messages -->
    <div id="chat"
      class="flex-1 overflow-y-auto space-y-2 mb-3 p-2">
      
      <p class="text-gray-500 text-center">
        Start your movie night 🍿
      </p>

    </div>

    <!-- Chat Input -->
    <div class="flex gap-2">
      <input id="messageInput" placeholder="Type a message..."
        class="flex-1 p-2 rounded-lg bg-gray-800 outline-none" />
      <button onclick="sendMessage()"
        class="bg-purple-500 px-3 rounded-lg hover:bg-purple-600">
        Send
      </button>
    </div>

  </div>

</div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<!-- Your Script -->
<script src="script.js"></script>

</body>
</html>
